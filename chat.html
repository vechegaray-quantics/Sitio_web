<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0d1b2a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Quantics AI | Diagnóstico Inteligente</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    />
    <script
        src="https://kit.fontawesome.com/a076d05399.js"
        crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="css/chat.css" />

    <script>
        window.__turnstileState = window.__turnstileState || { token: null };

        window.onTurnstileSuccess = function onTurnstileSuccess(token) {
            window.__turnstileState.token = token || null;
        };

        window.onTurnstileExpired = function onTurnstileExpired() {
            window.__turnstileState.token = null;
        };

        window.onTurnstileError = function onTurnstileError() {
            window.__turnstileState.token = null;
        };
    </script>
    <script
        src="https://challenges.cloudflare.com/turnstile/v0/api.js"
        async
        defer
    ></script>
</head>
<body>
    <canvas id="graph-canvas"></canvas>
    <div class="bg-gradient"></div>
    <div class="cursor-dot"></div>

    <div class="glass-panel" id="main-panel">
        <div class="view active" id="view-1">
            <div class="v1-content">
                <h1 class="huge-title">Diagnóstico Inicial</h1>
                <p class="huge-subtitle">
                    Nuestro agente IA se encargará del primer engagement.<br />
                    Esto no toma más de 5 minutos.
                </p>

                <div class="clean-input-group">
                    <input
                        type="text"
                        id="company-name"
                        required
                        placeholder="Ej. Nexus Corp"
                    />
                    <label>Nombre de la Empresa</label>
                </div>

                <div class="clean-input-group">
                    <input
                        type="text"
                        id="industry"
                        required
                        placeholder="Ej. Finanzas, Logística, Retail"
                    />
                    <label>Industria / Sector</label>
                </div>

                <div class="clean-input-group">
                    <input
                        type="email"
                        id="contact-email"
                        required
                        placeholder="nombre@empresa.com"
                    />
                    <label>Email</label>
                </div>

                <div class="turnstile-wrap">
                    <div
                        id="turnstile-widget"
                        class="cf-turnstile"
                        data-sitekey="0x4AAAAAACrvwz0HKnicGq56"
                        data-callback="onTurnstileSuccess"
                        data-expired-callback="onTurnstileExpired"
                        data-error-callback="onTurnstileError"
                    ></div>
                </div>

                <button class="btn-magic" id="start-flow-btn" type="button">
                    Iniciar Diagnóstico
                    <span class="arrow"><i class="fas fa-arrow-right"></i></span>
                </button>
            </div>
        </div>

        <div class="view" id="view-2">
            <div class="v2-content">
                <div class="scanner-ring">
                    <svg viewBox="0 0 120 120">
                        <circle class="bg" cx="60" cy="60" r="54"></circle>
                        <circle class="progress" cx="60" cy="60" r="54"></circle>
                    </svg>
                    <div class="pulse-core"></div>
                </div>
                <h2 class="status-text" id="loading-title">
                    Conectando con nuestro Agente
                </h2>
                <p class="status-sub" id="loading-sub"></p>
            </div>
        </div>

        <div class="view chat-layout" id="view-3">
            <div class="chat-topbar">
                <div class="nexus-brand">
                    <span class="topbar-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" class="avatar-svg avatar-svg-ai">
                            <path d="M12 2a1 1 0 0 1 1 1v1.18a4.5 4.5 0 0 1 3.82 3.82H18a3 3 0 0 1 3 3v4a3 3 0 0 1-3 3h-1.18A4.5 4.5 0 0 1 13 20.82V22a1 1 0 1 1-2 0v-1.18A4.5 4.5 0 0 1 7.18 17H6a3 3 0 0 1-3-3v-4a3 3 0 0 1 3-3h1.18A4.5 4.5 0 0 1 11 4.18V3a1 1 0 0 1 1-1Z" fill="currentColor" opacity="0.14"/>
                            <path d="M12 3v2M8.5 15h7M9 8h6a2.5 2.5 0 0 1 2.5 2.5v3A2.5 2.5 0 0 1 15 16h-6a2.5 2.5 0 0 1-2.5-2.5v-3A2.5 2.5 0 0 1 9 8Zm1.5 3.25h.01M13.5 11.25h.01M4 11v2M20 11v2" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </span> Agente Quantics
                </div>
                <div class="chat-topbar-actions">
                    <div class="context-tag">
                        <i class="fas fa-database"></i>
                        <span id="tag-company"></span>
                    </div>
                    <!-- <button class="btn-finish" onclick="finishInterview()">Finalizar Sesión</button> -->
                </div>
            </div>

            <div class="chat-scroll" id="chat-history"></div>

            <div class="input-dock">
                <div class="dock-container">
                    <input
                        type="text"
                        id="chat-input"
                        placeholder="Responde para profundizar el diagnóstico..."
                        onkeypress="handleKeyPress(event)"
                    />
                    <button class="btn-send" onclick="sendMessage()">
                        <svg viewBox="0 0 24 24" aria-hidden="true" class="send-icon">
                            <path d="M21.55 3.45a1.2 1.2 0 0 0-1.23-.27L3.8 9.26a1.17 1.17 0 0 0 .08 2.22l6.67 2.17 2.17 6.67a1.17 1.17 0 0 0 2.22.08l6.08-16.52a1.2 1.2 0 0 0-.27-1.23Z" fill="currentColor" opacity="0.2"/>
                            <path d="m10.55 13.65 3.1-3.1m7.9-7.1L10.55 13.65m0 0-6.67-2.17a1.17 1.17 0 0 1-.08-2.22l16.52-6.08a1.2 1.2 0 0 1 1.23.27 1.2 1.2 0 0 1 .27 1.23l-6.08 16.52a1.17 1.17 0 0 1-2.22-.08l-2.17-6.67Z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <div class="view" id="view-4">
            <div class="v4-content">
                <div class="success-icon">
                    <i class="fas fa-check"></i>
                </div>
                <h2 class="huge-title" style="font-size: 1.8rem;">
                    Diagnóstico Finalizado
                </h2>
                <p class="huge-subtitle" style="margin-bottom: 0;">
                    Gracias. Hemos recibido tu información correctamente.
                </p>
            </div>
        </div>
    </div>

    <script>
        window.NEXUS_API_BASE_URL =
            window.NEXUS_API_BASE_URL ||
            "https://api-y2upbboyhq-tl.a.run.app/v1";
    </script>
    <script src="js/chat.js"></script>
</body>
</html>
