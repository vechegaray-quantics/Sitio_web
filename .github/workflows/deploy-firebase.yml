name: Deploy Firebase Hosting

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Autenticar con Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/208695264438/locations/global/workloadIdentityPools/github/providers/sitio-web'
          service_account: 'github-deploy@sitio-web-quantics.iam.gserviceaccount.com'

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          version: '>= 363.0.0'
          project_id: 'sitio-web-quantics'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy
        run: firebase deploy --only hosting --project sitio-web-quantics